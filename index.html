<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anphuni.com</title>
    <style>
        /* Core philosophy: be like water – minimal, dark, ever-shifting */
        body, html {
            margin: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: monospace;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            pointer-events: none;
        }

        #terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 90%;
            max-width: 800px;
            text-align: center;
            z-index: 2;
        }

        #prompt {
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        #input {
            border: none;
            background: transparent;
            border-bottom: 2px solid #0088ff;
            color: #fff;
            font-size: 1.5rem;
            width: 80%;
            text-align: center;
            outline: none;
        }

        #output {
            margin-top: 40px;
            opacity: 0;
            transition: opacity 1s;
        }

        .glitch {
            color: #0088ff;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%,100% {
                text-shadow: 0 0 10px #0088ff;
            }

            20% {
                text-shadow: 2px 2px #ff0088,-2px -2px #00ff88;
            }
        }
        /* Tapestry essence score (0-100) – will drive particle density, color shift, chaos level */
        :root {
            --essence: 30;
        }
    </style>
</head>
<body>
    <canvas id="tapestry"></canvas>

    <div id="terminal">
        <div id="prompt" class="glitch">...Hello, User</div>
        <div>Type anything to start</div>
        <input id="input" type="text" autofocus autocomplete="off">
        <div id="output"></div>
    </div>

    <script>
        // === TAPESTRY: live AI-interpreted visual layer ===
        // Concept: Every log/entry has an "essence" score (chaos, depth, beauty, darkness, novelty).
        // Combined site essence drives particle count, hue shift, connection strength, and distortion.
        // With current ~10 text logs + future growth → lightweight Three.js or pure 2D canvas is enough.
        // Future: pull real-time essence from backend (e.g., /api/essence → 0-100) and log archive size.
        const canvas = document.getElementById('tapestry');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const maxParticles = 800; // scales with essence

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.life = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        function initTapestry() {
            particles = [];
            const essence = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--essence')) || 30;
            const count = Math.floor(maxParticles * (essence / 100));
            for(let i = 0; i < count; i++) particles.push(new Particle());
        }

        function drawTapestry() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const essence = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--essence')) || 30;
            const hue = essence * 2.4; // blue → violet → red chaos

            particles.forEach(p => {
                p.update();
                ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${p.life * (essence/100)})`;
                ctx.fillRect(p.x, p.y, 2 + essence/20, 2 + essence/20);

                // connections
                particles.forEach(p2 => {
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) {
                        ctx.strokeStyle = `hsla(${hue}, 70%, 50%, ${0.1 * (1 - dist/120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(drawTapestry);
        }

        // === USER INPUT → PROPOSAL ENGINE ===
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        // Mock log archive + essence calculation (replace with real API later)
        const logs = [
            "A new medium of storytelling is on the horizon...",
            "The spirit hovered over the surface of the deep...",
            "It took everything I've got...",
            "Feels like I'm devouring this feeling of what's real",
            "Eyelid Membrane Trip"
            // ... all your .txt and .docx logs will live here or in /logs/
        ];

        function calculateRelevance(userInput) {
            // Simple keyword + sentiment relevance (replace with Grok API later)
            const lower = userInput.toLowerCase();
            const matches = logs.filter(log =>
                log.toLowerCase().includes(lower) ||
                lower.includes('dark') && log.includes('dark') ||
                lower.includes('dream') && log.includes('dream')
            );
            return { matches, score: matches.length * 20 + Math.random() * 30 };
        }

        async function propose(userInput) {
            const { matches, score } = calculateRelevance(userInput);
            const newEssence = Math.min(100, 20 + score);

            document.documentElement.style.setProperty('--essence', newEssence);
            initTapestry();

            let result = `<div class="glitch">...${matches.length ? matches[0].slice(0,80)+'...' : 'a seed in the void'}</div>`;
            result += `<br><br><small>Essence flow: ${newEssence.toFixed(0)}%</small>`;
            result += `<br><br><small>Advanced mode: hold ↩ for 3s → raw data flood</small>`;
            output.innerHTML = result;
            output.style.opacity = 1;
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (e.repeat) {
                    let hold = 0;
                    const timer = setInterval(() => {
                        if (++hold >= 30) { // 3s hold
                            clearInterval(timer);
                            output.innerHTML += '<br><br>RAW LOG DUMP:<br>' + logs.join('<br>---<br>');
                        }
                    }, 100);
                    input.addEventListener('keyup', () => clearInterval(timer), {once:true});
                } else {
                    propose(input.value || ' ');
                    input.value = '';
                }
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initTapestry();
        });

        initTapestry();
        drawTapestry();
    </script>
</body>
</html>
